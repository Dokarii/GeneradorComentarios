<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Comentarios de Twitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Dependencias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header section -->
        <header class="fade-in-down">
            <h1><ion-icon name="logo-twitch"></ion-icon>Twitch Comment Generator</h1>
            <p>Para generar comentarios y usarlos en tus videos</p>
        </header>

        <main class="main-content">
            <!-- Sidebar para personalizar -->
            <aside class="controls-panel glass-panel fade-in-up">
                <h2><ion-icon name="options-outline"></ion-icon> Configuración</h2>

                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" value="Dokari" placeholder="Ej: Ninja, Rubius...">
                </div>

                <div class="input-group">
                    <label for="userColor">Color del Usuario</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="userColor" value="#3b3bfc">
                        <span class="color-hex" id="colorHex">#3B3BFC</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="comment">Comentario</label>
                    <textarea id="comment"
                        rows="4">Comentario promedio para ser generado por el generador, valga la redundancia.</textarea>
                </div>

                <div class="toggle-group">
                    <label class="toggle-label">
                        <span class="toggle-text">Emblema Fundador / Mod</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="showBadge1" checked>
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>

                <div class="toggle-group">
                    <label class="toggle-label">
                        <span class="toggle-text">Emblema Suscriptor (Mes 1)</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="showBadge2" checked>
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </aside>

            <!-- Preview -->
            <section class="preview-panel">
                <div class="preview-header fade-in-up" style="animation-delay: 0.1s">
                    <h2>Vista Previa</h2>
                    <button class="btn-primary" id="downloadBtn">
                        <ion-icon name="download-outline"></ion-icon> Descargar
                    </button>
                </div>

                <div class="preview-container glass-panel fade-in-up" style="animation-delay: 0.2s">
                    <div id="capture-area" class="twitch-comment-box">
                        <div class="twitch-comment-line">
                            <span class="badges" id="badges-container">
                                <img id="badge1-img" class="twitch-badge"
                                    src="data:image/svg+xml;charset=utf-8,%3Csvg width='18' height='18' viewBox='0 0 18 18' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.5 10C13.5 11.933 11.933 13.5 10 13.5H5C3.067 13.5 1.5 11.933 1.5 10C1.5 8.261 2.767 6.817 4.438 6.534C4.912 4.257 6.927 2.5 9.333 2.5C11.689 2.5 13.667 4.197 14.217 6.424C15.981 6.651 17.333 8.166 17.333 10C17.333 11.933 15.766 13.5 13.833 13.5H13.5V10Z' fill='%23A87AEE'/%3E%3C/svg%3E"
                                    alt="Badge 1">
                                <img id="badge2-img" class="twitch-badge"
                                    src="data:image/svg+xml;charset=utf-8,%3Csvg width='18' height='18' viewBox='0 0 18 18' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='2' y='6' width='14' height='10' rx='1' fill='%23E2B12F'/%3E%3Crect x='1' y='4' width='16' height='3' rx='0.5' fill='%23F4DD9A'/%3E%3Cpath d='M9 4V16' stroke='%23C9971C' stroke-width='1.5'/%3E%3Cpath d='M5 4C5 2.895 5.895 2 7 2C8.105 2 9 2.895 9 4H5Z' fill='%23E2B12F' stroke='%23F4DD9A'/%3E%3Cpath d='M13 4C13 2.895 12.105 2 11 2C9.895 2 9 2.895 9 4H13Z' fill='%23E2B12F' stroke='%23F4DD9A'/%3E%3Ctext x='9' y='14' font-family='Arial' font-size='8.5' font-weight='bold' fill='white' text-anchor='middle'%3E1%3C/text%3E%3C/svg%3E"
                                    alt="Badge 2">
                            </span>
                            <span class="username" id="display-username">Dokarii</span><span class="colon"
                                id="display-colon">:</span>
                            <span class="message" id="display-message">Comentario promedio para ser generado por el
                                generador, valga la redundancia.</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
